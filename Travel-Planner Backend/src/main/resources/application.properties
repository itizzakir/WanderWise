spring.application.name=wanderwise-backend
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/wanderwise_db
spring.datasource.username=root
spring.datasource.password=Zakir@123

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=replace_this_with_a_minimum_32_character_secret_key
app.jwt.expiration-ms=86400000
app.cors.allowed-origins=http://localhost:5173

# AI integration
app.ai.enabled=${AI_ENABLED:true}
app.ai.provider=${AI_PROVIDER:openai}
app.ai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
app.ai.api-key=${OPENAI_API_KEY:}
app.ai.model=${OPENAI_MODEL:gpt-4.1}
app.ai.temperature=${OPENAI_TEMPERATURE:0.4}
app.ai.max-conversation-messages=${AI_MAX_CONVERSATION_MESSAGES:10}
